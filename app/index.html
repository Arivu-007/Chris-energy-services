<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CES Field">
  <meta name="description" content="Chris Energy Services — Field Operations App for appointments, stock management, and job completions.">
  <title>CES Field — Chris Energy Services</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       LOGIN SCREEN
  ═══════════════════════════════════════════════════ -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg-grid"></div>
    <div class="login-wrap">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div class="login-logo-text">
          <span>Chris Energy</span>
          <small>Field Operations</small>
        </div>
      </div>

      <div class="login-card">
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-sub">Select your profile or sign in below</p>

        <div class="user-avatars" id="userAvatars"></div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="fld">
            <label for="li-user">Username</label>
            <input type="text" id="li-user" name="username" placeholder="e.g. jake" autocomplete="username" spellcheck="false">
          </div>
          <div class="fld">
            <label for="li-pass">Password</label>
            <div class="pass-wrap">
              <input type="password" id="li-pass" name="password" placeholder="Your password" autocomplete="current-password">
              <button type="button" id="togglePwd" aria-label="Show/hide password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="loginErr" class="login-err hidden">Incorrect username or password.</div>
          <button type="submit" class="btn-signin" id="signinBtn">
            Sign In
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
        <p class="login-hint"><strong>Admin:</strong> chris / admin123 &nbsp;|&nbsp; <strong>Tech:</strong> jake / tech123</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       APP SHELL (hidden until logged in)
  ═══════════════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Sidebar — tablet/desktop only -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="sb-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          <div>
            <span>Chris Energy</span>
            <small>Field App</small>
          </div>
        </div>
      </div>
      <nav class="sb-nav" id="sbNav"></nav>
      <div class="sb-user" id="sbUser"></div>
    </aside>

    <!-- Main content wrapper -->
    <div class="main-wrap">

      <!-- Top bar — mobile only -->
      <header class="top-bar" id="topBar">
        <div class="tb-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          <span>CES Field</span>
        </div>
        <div class="tb-right">
          <div class="tb-avatar" id="tbAvatar"></div>
        </div>
      </header>

      <!-- Page views -->
      <main class="page" id="page">
        <div id="v-dashboard"    class="view"></div>
        <div id="v-appointments" class="view hidden"></div>
        <div id="v-stock"        class="view hidden"></div>
        <div id="v-completions"  class="view hidden"></div>
      </main>
    </div>

    <!-- Bottom nav — mobile only -->
    <nav class="btm-nav" id="btmNav">
      <button class="bn-btn" data-view="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="bn-btn" data-view="appointments">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Jobs</span>
      </button>
      <button class="bn-btn" data-view="stock">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Stock</span>
      </button>
      <button class="bn-btn" data-view="completions">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Done</span>
      </button>
      <button class="bn-btn" id="bnLogout">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Logout</span>
      </button>
    </nav>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL
  ═══════════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-bd" id="modalBd"></div>
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-handle"></div>
      <div class="modal-inner" id="modalInner"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toasts" id="toasts"></div>

  <script src="js/app.js"></script>
</body>
</html>
